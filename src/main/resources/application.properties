spring.application.name=inventory

# Render injects PORT; local default 9090 when running beside the main API on 8080.
server.port=${PORT:9090}

# Optional gitignored overrides (copy from application-local.properties).
spring.config.import=optional:classpath:application-local.properties

# Same Neon/Render vars as main API (postgresql:// normalized at startup).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/real_time_order_processing}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
# Use SPRING_DATASOURCE_PASSWORD env, DB_PASSWORD fallback, or application-local.properties
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

# Kafka — local: omit Confluent envs (defaults below). Confluent Cloud on Render: set only these four —
# SPRING_KAFKA_BOOTSTRAP_SERVERS, SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL, SPRING_KAFKA_PROPERTIES_SASL_MECHANISM,
# SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG (values from Confluent cluster → Clients → Java).
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.properties.security.protocol=${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:PLAINTEXT}
